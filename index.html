<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSCHE PREMIUM PORTAL</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins', sans-serif;}
  body{background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);min-height:100vh;color:#fff;}
  
  .navbar{display:flex;align-items:center;justify-content:space-between;padding:20px 60px;background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.2);position:sticky;top:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:12px;font-size:24px;font-weight:700;}
  .nav-links{display:flex;gap:30px;}
  .nav-links a{color:#fff;text-decoration:none;font-weight:500;transition:0.3s;cursor:pointer;}
  .nav-links a:hover{color:#ffd700;transform:translateY(-2px);}
  
  .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 20px;}
  .hero h1{font-size:48px;font-weight:700;background:linear-gradient(90deg,#fff,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px;}
  .hero p{font-size:18px;opacity:0.9;margin-bottom:30px;}
  
  .btn-primary{padding:16px 40px;background:linear-gradient(90deg,#ff6b6b,#feca57);color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;transition:0.3s;box-shadow:0 8px 20px rgba(0,0,0,0.3);}
  .btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.4);}
  
  .container{max-width:500px;margin:60px auto;padding:50px;background:rgba(255,255,255,0.15);backdrop-filter:blur(20px);border-radius:20px;border:1px solid rgba(255,255,255,0.2);box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .container h2{text-align:center;font-size:32px;margin-bottom:30px;}
  .input-group{margin-bottom:25px;}
  .input-group label{display:block;margin-bottom:8px;font-weight:600;opacity:0.9;}
  .input-group input{width:100%;padding:16px;border-radius:12px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;font-size:15px;transition:0.3s;}
  .input-group input:focus{outline:none;border-color:#ffd700;background:rgba(255,255,255,0.2);}
  .input-group input::placeholder{color:rgba(255,255,255,0.6);}
  
  .msg{margin:20px 0;padding:15px;border-radius:10px;text-align:center;font-weight:600;}
  .msg.success{background:rgba(46,204,113,0.3);}
  .msg.error{background:rgba(231,76,60,0.3);}
  
  .link-text{text-align:center;margin-top:20px;}
  .link-text a{color:#ffd700;text-decoration:none;font-weight:600;cursor:pointer;}
  
  @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn 0.6s ease-out;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const API_URL = "https://icemodel.onrender.com"; // NEE RENDER URL IKKADA PETTU

function App(){
  const [page, setPage] = React.useState('home');
  const [name, setName] = React.useState('');
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [msg, setMsg] = React.useState('');
  const [msgType, setMsgType] = React.useState('');

  const wakeServer = async () => {
    await fetch(API_URL + '/').catch(()=>{});
    await new Promise(r => setTimeout(r, 5000));
  }

  const handleLogin = async () => {
    setMsg('Waking Premium Server... 5 sec'); setMsgType('');
    await wakeServer();
    
    try {
      const res = await fetch(`${API_URL}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if(res.ok){
        setMsg('Login Success! Welcome Back ✅'); setMsgType('success');
        setTimeout(()=>alert("Welcome " + data.name), 500);
      } else {
        setMsg(data.message || 'Login Failed'); setMsgType('error');
      }
    } catch(err){
      setMsg('Server sleeping. 1 min wait chesi refresh chey'); setMsgType('error');
    }
  }

  const handleRegister = async () => {
    setMsg('Creating Premium Account... 5 sec'); setMsgType('');
    await wakeServer();

    try {
      const res = await fetch(`${API_URL}/register`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name, email, password})
      });
      const data = await res.json();
      if(res.ok){
        setMsg('Account Created! Now Login chey ✅'); setMsgType('success');
      } else {
        setMsg(data.message); setMsgType('error');
      }
    } catch(err){
      setMsg('Server Error. Malli try chey'); setMsgType('error');
    }
  }

  if(page === 'home') return(
    <div className="fade-in">
      <div className="navbar">
        <div className="logo">🎓 APSCHE PREMIUM</div>
        <div className="nav-links">
          <a onClick={()=>setPage('home')}>Home</a>
          <a onClick={()=>setPage('login')}>Login</a>
          <a onClick={()=>setPage('register')}>Register</a>
        </div>
      </div>
      <div className="hero">
        <h1>APSCHE Practice Model</h1>
        <p>India's Most Premium Mock Test Platform for Future Leaders</p>
        <button className="btn-primary" onClick={()=>setPage('register')}>Start Free Mock Test →</button>
      </div>
    </div>
  )

  if(page === 'register') return(
    <div className="fade-in">
      <div className="navbar">
        <div className="logo">🎓 APSCHE PREMIUM</div>
        <div className="nav-links">
          <a onClick={()=>setPage('home')}>Home</a>
          <a onClick={()=>setPage('login')}>Login</a>
          <a onClick={()=>setPage('register')}>Register</a>
        </div>
      </div>
      <div className="container">
        <h2>Create Account</h2>
        <div className="input-group">
          <label>Full Name</label>
          <input placeholder="Enter your name" value={name} onChange={e=>setName(e.target.value)}/>
        </div>
        <div className="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div className="input-group">
          <label>Password</label>
          <input type="password" placeholder="Create strong password" value={password} onChange={e=>setPassword(e.target.value)}/>
        </div>
        <button className="btn-primary" style={{width:'100%'}} onClick={handleRegister}>Register Now</button>
        {msg && <div className={`msg ${msgType}`}>{msg}</div>}
        <p className="link-text">Already have account? <a onClick={()=>setPage('login')}>Login Here</a></p>
      </div>
    </div>
  )

  if(page === 'login') return(
    <div className="fade-in">
      <div className="navbar">
        <div className="logo">🎓 APSCHE PREMIUM</div>
        <div className="nav-links">
          <a onClick={()=>setPage('home')}>Home</a>
          <a onClick={()=>setPage('login')}>Login</a>
          <a onClick={()=>setPage('register')}>Register</a>
        </div>
      </div>
      <div className="container">
        <h2>Welcome Back</h2>
        <div className="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div className="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter password" value={password} onChange={e=>setPassword(e.target.value)}/>
        </div>
        <button className="btn-primary" style={{width:'100%'}} onClick={handleLogin}>Login to Portal</button>
        {msg && <div className={`msg ${msgType}`}>{msg}</div>}
        <p className="link-text">New user? <a onClick={()=>setPage('register')}>Create Account</a></p>
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
  </html>
