<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSCHE EAMCET PORTAL 2026</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter', sans-serif;}
  body{background:#0a0e27;color:#fff;}
  .navbar{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:linear-gradient(90deg,#1e3c72,#2a5298);box-shadow:0 4px 20px rgba(0,0,0,0.5);position:sticky;top:0;}
  .logo{font-size:26px;font-weight:800;background:linear-gradient(90deg,#ffd700,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .nav-links{display:flex;gap:25px;}
  .nav-links a{color:#fff;text-decoration:none;font-weight:600;cursor:pointer;}
  .hero{padding:80px 20px;text-align:center;background:linear-gradient(135deg,#667eea,#764ba2);}
  .hero h1{font-size:48px;margin-bottom:15px;}
  .btn{padding:15px 35px;background:linear-gradient(90deg,#f093fb,#f5576c);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,0.3);}
  .container{max-width:1200px;margin:40px auto;padding:20px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;}
  .card{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:25px;border-radius:15px;border:1px solid rgba(255,255,255,0.1);transition:0.3s;}
  .card:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,0,0,0.4);}
  input,select{width:100%;padding:14px;margin:10px 0;border-radius:10px;border:2px solid #2a5298;background:#0a0e27;color:#fff;}
  .form-box{max-width:500px;margin:40px auto;padding:40px;background:linear-gradient(135deg,#1e3c72,#2a5298);border-radius:20px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const API_URL = "https://nodel.onrender.com"; // NEE RENDER URL

function App(){
  const [page, setPage] = React.useState('home');
  const [user, setUser] = React.useState(null);
  const [colleges, setColleges] = React.useState([]);
  const [form, setForm] = React.useState({name:'',email:'',password:'',rank:'',category:''});
  const [msg, setMsg] = React.useState('');

  const wake = async ()=>{await fetch(API_URL+'/').catch(()=>{});await new Promise(r=>setTimeout(r,3000));}

  const handleRegister = async ()=>{
    setMsg('Creating account...');
    await wake();
    const res = await fetch(API_URL+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)});
    const data = await res.json();
    setMsg(data.msg);
    if(res.ok) setPage('login');
  }

  const handleLogin = async ()=>{
    setMsg('Logging in...');
    await wake();
    const res = await fetch(API_URL+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:form.email,password:form.password})});
    const data = await res.json();
    setMsg(data.msg);
    if(res.ok){setUser(data);setPage('dashboard');fetchColleges();}
  }

  const fetchColleges = async ()=>{
    const res = await fetch(`${API_URL}/colleges?maxRank=${form.rank||99999}`);
    const data = await res.json();
    setColleges(data);
  }

  if(page==='home') return(
    <div>
      <div className="navbar"><div className="logo">🎓 APSCHE PREMIUM</div><div className="nav-links"><a onClick={()=>setPage('home')}>Home</a><a onClick={()=>setPage('login')}>Login</a><a onClick={()=>setPage('register')}>Register</a></div></div>
      <div className="hero"><h1>AP EAMCET COUNSELLING 2026</h1><p>Find Your Dream College Based on Rank</p><br/><button className="btn" onClick={()=>setPage('register')}>Start Counselling →</button></div>
    </div>
  )

  if(page==='register') return(
    <div><div className="navbar"><div className="logo">🎓 APSCHE</div></div>
    <div className="form-box"><h2>Student Registration</h2>
      <input placeholder="Full Name" onChange={e=>setForm({...form,name:e.target.value})}/>
      <input placeholder="Email" onChange={e=>setForm({...form,email:e.target.value})}/>
      <input type="password" placeholder="Password" onChange={e=>setForm({...form,password:e.target.value})}/>
      <input placeholder="EAMCET Rank" onChange={e=>setForm({...form,rank:e.target.value})}/>
      <select onChange={e=>setForm({...form,category:e.target.value})}><option>Category</option><option>OC</option><option>BC-A</option><option>BC-B</option><option>SC</option><option>ST</option></select>
      <button className="btn" style={{width:'100%'}} onClick={handleRegister}>Register</button>
      <p>{msg}</p>
    </div></div>
  )

  if(page==='login') return(
    <div><div className="navbar"><div className="logo">🎓 APSCHE</div></div>
    <div className="form-box"><h2>Student Login</h2>
      <input placeholder="Email" onChange={e=>setForm({...form,email:e.target.value})}/>
      <input type="password" placeholder="Password" onChange={e=>setForm({...form,password:e.target.value})}/>
      <button className="btn" style={{width:'100%'}} onClick={handleLogin}>Login</button>
      <p>{msg}</p>
    </div></div>
  )

  if(page==='dashboard') return(
    <div>
      <div className="navbar"><div className="logo">🎓 APSCHE</div><div>Welcome {user.name} | Rank: {user.rank}</div></div>
      <div className="container">
        <h2>Eligible Colleges for Rank {user.rank}</h2>
        <div className="grid">
          {colleges.map(c=>(
            <div className="card" key={c.id}>
              <h3>{c.name}</h3>
              <p><b>Branch:</b> {c.branch}</p>
              <p><b>Cutoff:</b> {c.cutoff}</p>
              <p><b>Fees:</b> ₹{c.fees}</p>
              <p><b>District:</b> {c.district}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  )
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
