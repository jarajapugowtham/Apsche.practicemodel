<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSCHE EAMCET COUNSELLING 2026</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{background: #0f172a;color:#fff;overflow-x:hidden;}
.header{background:linear-gradient(90deg,#1e40af,#3b82f6);padding:18px 60px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(59,130,246,0.4);position:sticky;top:0;z-index:99;}
.logo{font-size:22px;font-weight:800;display:flex;gap:10px;align-items:center;}
.nav{display:flex;gap:30px;}
.nav a{color:#fff;text-decoration:none;font-weight:600;cursor:pointer;transition:0.2s;}
.nav a:hover{color:#facc15;}
.hero{background:linear-gradient(135deg,#1e3a8a,#1e40af);padding:100px 20px;text-align:center;}
.hero h1{font-size:52px;font-weight:800;margin-bottom:15px;background:linear-gradient(90deg,#facc15,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:18px;opacity:0.9;margin-bottom:30px;}
.btn{padding:16px 40px;background:linear-gradient(90deg,#f97316,#facc15);border:none;border-radius:12px;color:#000;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 8px 25px rgba(249,115,22,0.4);transition:0.3s;}
.btn:hover{transform:scale(1.05);}
.container{max-width:1100px;margin:50px auto;padding:20px;}
.card{background:linear-gradient(135deg,#1e293b,#334155);padding:30px;border-radius:16px;border:1px solid rgba(59,130,246,0.3);box-shadow:0 10px 40px rgba(0,0,0,0.4);}
input,select{width:100%;padding:15px;margin:12px 0;border-radius:10px;border:2px solid #334155;background:#0f172a;color:#fff;font-size:15px;}
input:focus{border-color:#3b82f6;outline:none;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:30px;}
.college-card{background:#1e293b;padding:20px;border-radius:12px;border-left:4px solid #f97316;}
.msg{padding:12px;border-radius:8px;margin:15px 0;text-align:center;font-weight:600;}
.success{background:rgba(34,197,94,0.2);color:#4ade80;}
.error{background:rgba(239,68,68,0.2);color:#f87171;}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fade 0.5s ease-out;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const API_URL = "https://nodel.onrender.com"; // NEE BACKEND URL

function App(){
  const [page,setPage]=React.useState('home');
  const [form,setForm]=React.useState({name:'',email:'',password:'',rank:'',category:'OC'});
  const [user,setUser]=React.useState(null);
  const [colleges,setColleges]=React.useState([]);
  const [msg,setMsg]=React.useState(''); const [type,setType]=React.useState('');

  const wake=async()=>{await fetch(API_URL+'/').catch(()=>{});await new Promise(r=>setTimeout(r,4000));}

  const register=async()=>{
    setMsg('Creating account...');setType('');
    await wake();
    const res=await fetch(API_URL+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(form)});
    const data=await res.json();
    setMsg(data.msg); setType(res.ok?'success':'error');
    if(res.ok) setTimeout(()=>setPage('login'),1000);
  }

  const login=async()=>{
    setMsg('Logging in...');setType('');
    await wake();
    const res=await fetch(API_URL+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:form.email,password:form.password})});
    const data=await res.json();
    setMsg(data.msg); setType(res.ok?'success':'error');
    if(res.ok){setUser(data);setPage('dashboard');loadColleges();}
  }

  const loadColleges=async()=>{
    const res=await fetch(`${API_URL}/colleges?maxRank=${form.rank||99999}`);
    setColleges(await res.json());
  }

  if(page==='home')return(
    <div className="fade">
      <div className="header"><div className="logo">🎓 APSCHE PREMIUM</div><div className="nav"><a onClick={()=>setPage('home')}>Home</a><a onClick={()=>setPage('login')}>Login</a><a onClick={()=>setPage('register')}>Register</a></div></div>
      <div className="hero"><h1>AP EAMCET COUNSELLING 2026</h1><p>Find Best Colleges Based on Your Rank | 100% Free</p><button className="btn" onClick={()=>setPage('register')}>Start Now →</button></div>
    </div>
  )

  if(page==='register')return(
    <div className="fade"><div className="header"><div className="logo">🎓 APSCHE</div></div>
    <div className="container"><div className="card" style={{maxWidth:'500px',margin:'0 auto'}}><h2>Student Registration</h2>
      <input placeholder="Full Name" onChange={e=>setForm({...form,name:e.target.value})}/>
      <input placeholder="Email" type="email" onChange={e=>setForm({...form,email:e.target.value})}/>
      <input placeholder="Password" type="password" onChange={e=>setForm({...form,password:e.target.value})}/>
      <input placeholder="EAMCET Rank" type="number" onChange={e=>setForm({...form,rank:e.target.value})}/>
      <select onChange={e=>setForm({...form,category:e.target.value})}><option>OC</option><option>BC-A</option><option>BC-B</option><option>SC</option><option>ST</option></select>
      <button className="btn" style={{width:'100%'}} onClick={register}>Register</button>
      {msg&&<div className={`msg ${type}`}>{msg}</div>}
    </div></div></div>
  )

  if(page==='login')return(
    <div className="fade"><div className="header"><div className="logo">🎓 APSCHE</div></div>
    <div className="container"><div className="card" style={{maxWidth:'500px',margin:'0 auto'}}><h2>Student Login</h2>
      <input placeholder="Email" type="email" onChange={e=>setForm({...form,email:e.target.value})}/>
      <input placeholder="Password" type="password" onChange={e=>setForm({...form,password:e.target.value})}/>
      <button className="btn" style={{width:'100%'}} onClick={login}>Login</button>
      {msg&&<div className={`msg ${type}`}>{msg}</div>}
    </div></div></div>
  )

  if(page==='dashboard')return(
    <div className="fade"><div className="header"><div className="logo">🎓 APSCHE</div><div>Welcome {user?.name} | Rank: {user?.rank}</div></div>
    <div className="container"><h2>Eligible Colleges for Rank {form.rank}</h2>
      <div className="grid">{colleges.map(c=>(
        <div className="college-card" key={c.id}>
          <h3>{c.name}</h3><p><b>Branch:</b> {c.branch}</p><p><b>Cutoff:</b> {c.cutoff}</p><p><b>Fees:</b> ₹{c.fees}</p><p><b>District:</b> {c.district}</p>
        </div>
      ))}</div>
    </div></div>
  )
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
  </html>
